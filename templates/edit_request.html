{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-warning text-dark">
                <div class="d-flex justify-content-between align-items-center">
                    <h4 class="mb-0"><i class="fas fa-edit me-2"></i>Edit Blood Request</h4>
                    <a href="{{ url_for('blood_requests') }}" class="btn btn-dark btn-sm">
                        <i class="fas fa-arrow-left me-1"></i> Back to Requests
                    </a>
                </div>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('edit_request', request_id=blood_request.id) }}">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Patient Name *</label>
                            <input type="text" name="patient_name" class="form-control" value="{{ blood_request.patient_name }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Hospital *</label>
                            <input type="text" name="hospital" class="form-control" value="{{ blood_request.hospital }}" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Blood Type *</label>
                            <select name="blood_type" class="form-select" required>
                                <option value="">Select Blood Type</option>
                                <option value="A+" {{ 'selected' if blood_request.blood_type == 'A+' }}>A+</option>
                                <option value="A-" {{ 'selected' if blood_request.blood_type == 'A-' }}>A-</option>
                                <option value="B+" {{ 'selected' if blood_request.blood_type == 'B+' }}>B+</option>
                                <option value="B-" {{ 'selected' if blood_request.blood_type == 'B-' }}>B-</option>
                                <option value="AB+" {{ 'selected' if blood_request.blood_type == 'AB+' }}>AB+</option>
                                <option value="AB-" {{ 'selected' if blood_request.blood_type == 'AB-' }}>AB-</option>
                                <option value="O+" {{ 'selected' if blood_request.blood_type == 'O+' }}>O+</option>
                                <option value="O-" {{ 'selected' if blood_request.blood_type == 'O-' }}>O-</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Units Required *</label>
                            <input type="number" name="units_required" class="form-control" value="{{ blood_request.units_required }}" min="1" required>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Urgency</label>
                            <select name="urgency" class="form-select">
                                <option value="Normal" {{ 'selected' if blood_request.urgency == 'Normal' }}>Normal</option>
                                <option value="Urgent" {{ 'selected' if blood_request.urgency == 'Urgent' }}>Urgent</option>
                                <option value="Critical" {{ 'selected' if blood_request.urgency == 'Critical' }}>Critical</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Contact Person *</label>
                            <input type="text" name="contact_person" class="form-control" value="{{ blood_request.contact_person }}" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Contact Number *</label>
                        <input type="text" name="contact_number" class="form-control" value="{{ blood_request.contact_number }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Additional Notes</label>
                        <textarea name="notes" class="form-control" rows="3" placeholder="Any additional information...">{{ blood_request.notes or '' }}</textarea>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('blood_requests') }}" class="btn btn-secondary me-md-2">Cancel</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-1"></i> Update Request
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
