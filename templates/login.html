<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Blood Bank Management System</title>

    <!-- Bootstrap, Font Awesome, and custom fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --red-deep: #a71d2a;
            --red-mid: #dc3545;
            --red-soft: #f8d7da;
            --cream: #fff5f5;
            --text-dark: #2c1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            min-height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Floating blood drops (same as your original) */
        .drops-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .drop {
            position: absolute;
            width: 14px;
            height: 18px;
            background: rgba(220, 53, 69, 0.15);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            opacity: 0;
            animation: float 12s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(110vh); opacity: 0; }
            10% { opacity: 0.25; }
            90% { opacity: 0.15; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        /* Main container */
        .page-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 1rem;
        }

        .split-card {
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(167, 29, 42, 0.15);
        }

        /* Left panel – simplified visual (no motivational text) */
        .visual-panel {
            background: linear-gradient(145deg, #a71d2a 0%, #dc3545 80%);
            padding: 2rem;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .visual-panel::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            top: -100px;
            right: -100px;
        }

        .visual-panel::after {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            bottom: -80px;
            left: -80px;
        }

        .visual-icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.1); }
        }

        .visual-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            text-align: center;
            line-height: 1.2;
            margin-bottom: 0.5rem;
        }

        .visual-sub {
            font-size: 1rem;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        /* Right panel – login form */
        .form-panel {
            padding: 3rem 2.8rem;
            background: white;
        }

        .form-header {
            margin-bottom: 2rem;
        }

        .form-header .brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .form-header .sub {
            color: #6c757d;
            font-size: 0.9rem;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group-text {
            background: var(--cream);
            border: 1.5px solid #f0d8d6;
            border-right: none;
            color: var(--red-mid);
        }

        .form-control {
            border: 1.5px solid #f0d8d6;
            border-left: none;
            background: var(--cream);
            padding: 0.65rem 0.9rem;
            font-size: 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus {
            border-color: var(--red-mid);
            box-shadow: 0 0 0 3px rgba(220, 53, 69, 0.12);
            background: #fff;
            outline: none;
        }

        .input-group:focus-within .input-group-text {
            border-color: var(--red-mid);
            background: #fff;
        }

        .btn-signin {
            background: linear-gradient(135deg, #dc3545, #a71d2a);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0.8rem;
            font-weight: 500;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.3);
            margin-top: 0.5rem;
        }

        .btn-signin:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(220, 53, 69, 0.4);
        }

        .btn-signin:active {
            transform: translateY(0);
        }

        .creds-box {
            background: var(--red-soft);
            color: #842029;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-top: 2rem;
            text-align: center;
            border: 1px dashed rgba(167, 29, 42, 0.3);
        }

        .alert {
            font-size: 0.85rem;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            .split-card {
                grid-template-columns: 1fr;
            }
            .visual-panel {
                display: none;
            }
            .form-panel {
                padding: 2.5rem 1.8rem;
            }
        }
    </style>
</head>
<body>

    <!-- Floating drops layer -->
    <div class="drops-layer" id="dropsLayer"></div>

    <div class="page-wrapper">
        <div class="split-card">

            <!-- Left visual panel (pure branding, no motivational text) -->
            <div class="visual-panel">
                <div class="visual-icon"><i class="fas fa-tint"></i></div>
                <div class="visual-title">Blood Bank</div>
                <div class="visual-sub">Login Portal</div>
            </div>

            <!-- Right login panel -->
            <div class="form-panel">
                <div class="form-header">
                    <div class="brand">Welcome Back</div>
                    <div class="sub">Sign in to manage the system</div>
                </div>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user-shield"></i></span>
                            <input type="text" class="form-control" id="username" name="username" 
                                   placeholder="admin" required autofocus>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-key"></i></span>
                            <input type="password" class="form-control" id="password" name="password" 
                                   placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-signin">
                        <i class="fas fa-sign-in-alt me-2"></i>Login to Dashboard
                    </button>
                </form>

                <!--<div class="creds-box">
                    <strong>Demo Credentials</strong><br>
                    Username: <strong>admin</strong> &nbsp;|&nbsp; Password: <strong>admin123</strong>
                </div>-->
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Generate floating drops (same as your original)
        const layer = document.getElementById('dropsLayer');
        for (let i = 0; i < 18; i++) {
            const drop = document.createElement('div');
            drop.classList.add('drop');
            const size = 8 + Math.random() * 20;
            drop.style.width = size + 'px';
            drop.style.height = (size * 1.2) + 'px';
            drop.style.left = Math.random() * 100 + '%';
            drop.style.animationDelay = Math.random() * 8 + 's';
            drop.style.animationDuration = 8 + Math.random() * 10 + 's';
            drop.style.background = 'rgba(220, 53, 69, ' + (0.1 + Math.random() * 0.15) + ')';
            layer.appendChild(drop);
        }
    </script>
</body>
</html>
